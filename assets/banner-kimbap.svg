<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Kimbap banner illustration</title>
  <desc id="desc">Stylized overhead view of Korean kimbap rolls and ingredients on a warm textured background.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d1b12" />
      <stop offset="45%" stop-color="#5a2b1d" />
      <stop offset="100%" stop-color="#7b3d22" />
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="42%" r="48%">
      <stop offset="0%" stop-color="#f5c56f" stop-opacity="0.32" />
      <stop offset="100%" stop-color="#f5c56f" stop-opacity="0" />
    </radialGradient>

    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity="0.26" />
    </filter>

    <pattern id="grain" width="140" height="140" patternUnits="userSpaceOnUse">
      <circle cx="24" cy="18" r="1.3" fill="#fff" fill-opacity="0.07" />
      <circle cx="86" cy="45" r="1" fill="#fff" fill-opacity="0.06" />
      <circle cx="130" cy="96" r="1.5" fill="#fff" fill-opacity="0.05" />
      <circle cx="52" cy="122" r="1.1" fill="#fff" fill-opacity="0.07" />
    </pattern>

    <linearGradient id="seaweed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1a15" />
      <stop offset="100%" stop-color="#24362f" />
    </linearGradient>

    <radialGradient id="rice" cx="50%" cy="50%" r="58%">
      <stop offset="0%" stop-color="#fffdf5" />
      <stop offset="100%" stop-color="#ece7db" />
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <rect width="1600" height="900" fill="url(#grain)" />
  <rect width="1600" height="900" fill="url(#glow)" />

  <g opacity="0.22">
    <ellipse cx="220" cy="770" rx="170" ry="24" fill="#f8d08f" />
    <ellipse cx="1380" cy="180" rx="200" ry="30" fill="#f8d08f" />
  </g>

  <g filter="url(#shadow)" transform="translate(800 460) rotate(-10)">
    <rect x="-430" y="-170" width="860" height="340" rx="170" fill="url(#seaweed)" />
    <rect x="-372" y="-118" width="744" height="236" rx="118" fill="url(#rice)" />

    <g opacity="0.9">
      <rect x="-300" y="-70" width="600" height="38" rx="19" fill="#ef9f56" />
      <rect x="-300" y="-20" width="600" height="34" rx="17" fill="#90b84e" />
      <rect x="-300" y="24" width="600" height="36" rx="18" fill="#d35f41" />
    </g>
  </g>

  <g transform="translate(1010 590) rotate(18)" filter="url(#shadow)">
    <g>
      <circle cx="0" cy="0" r="78" fill="url(#seaweed)" />
      <circle cx="0" cy="0" r="60" fill="url(#rice)" />
      <circle cx="-18" cy="-14" r="14" fill="#ef9f56" />
      <circle cx="18" cy="-12" r="12" fill="#90b84e" />
      <circle cx="8" cy="18" r="13" fill="#d35f41" />
      <circle cx="-20" cy="20" r="9" fill="#f5cf73" />
    </g>

    <g transform="translate(165 -10)">
      <circle cx="0" cy="0" r="78" fill="url(#seaweed)" />
      <circle cx="0" cy="0" r="60" fill="url(#rice)" />
      <circle cx="-15" cy="-16" r="13" fill="#ef9f56" />
      <circle cx="18" cy="-10" r="11" fill="#90b84e" />
      <circle cx="10" cy="20" r="13" fill="#d35f41" />
      <circle cx="-20" cy="18" r="8" fill="#f5cf73" />
    </g>

    <g transform="translate(328 -18)">
      <circle cx="0" cy="0" r="78" fill="url(#seaweed)" />
      <circle cx="0" cy="0" r="60" fill="url(#rice)" />
      <circle cx="-16" cy="-14" r="13" fill="#ef9f56" />
      <circle cx="18" cy="-12" r="10" fill="#90b84e" />
      <circle cx="10" cy="18" r="12" fill="#d35f41" />
      <circle cx="-20" cy="20" r="9" fill="#f5cf73" />
    </g>
  </g>

  <g opacity="0.18">
    <path d="M120 620c75-42 180-62 266-32" stroke="#fff" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M1180 260c85-44 188-66 282-28" stroke="#fff" stroke-width="7" fill="none" stroke-linecap="round"/>
  </g>
</svg>
