<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-labelledby="title desc">
  <title id="title">Shrimp kimbap illustration</title>
  <desc id="desc">Stylized shrimp kimbap pieces with bright seafood accents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8f1f4"/>
      <stop offset="100%" stop-color="#d2e2ea"/>
    </linearGradient>
    <linearGradient id="seaweed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14231f"/>
      <stop offset="100%" stop-color="#2e4237"/>
    </linearGradient>
    <radialGradient id="rice" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#fffef8"/>
      <stop offset="100%" stop-color="#ece9df"/>
    </radialGradient>
  </defs>
  <rect width="800" height="520" fill="url(#bg)"/>
  <ellipse cx="400" cy="300" rx="290" ry="150" fill="#f8f2e9"/>
  <g transform="translate(150 250)">
    <g>
      <circle cx="0" cy="0" r="60" fill="url(#seaweed)"/>
      <circle cx="0" cy="0" r="45" fill="url(#rice)"/>
      <ellipse cx="-10" cy="-8" rx="14" ry="10" fill="#f28a62"/>
      <ellipse cx="12" cy="-8" rx="12" ry="9" fill="#f28a62"/>
      <circle cx="-12" cy="15" r="9" fill="#8eb858"/>
      <circle cx="13" cy="16" r="8" fill="#e06b47"/>
    </g>
    <g transform="translate(112 -7)">
      <circle cx="0" cy="0" r="60" fill="url(#seaweed)"/>
      <circle cx="0" cy="0" r="45" fill="url(#rice)"/>
      <ellipse cx="-11" cy="-8" rx="14" ry="10" fill="#f28a62"/>
      <ellipse cx="12" cy="-9" rx="12" ry="9" fill="#f28a62"/>
      <circle cx="-11" cy="16" r="9" fill="#8eb858"/>
      <circle cx="13" cy="15" r="8" fill="#e06b47"/>
    </g>
    <g transform="translate(224 -14)">
      <circle cx="0" cy="0" r="60" fill="url(#seaweed)"/>
      <circle cx="0" cy="0" r="45" fill="url(#rice)"/>
      <ellipse cx="-10" cy="-8" rx="14" ry="10" fill="#f28a62"/>
      <ellipse cx="13" cy="-8" rx="12" ry="9" fill="#f28a62"/>
      <circle cx="-11" cy="16" r="9" fill="#8eb858"/>
      <circle cx="13" cy="16" r="8" fill="#e06b47"/>
    </g>
    <g transform="translate(336 -20)">
      <circle cx="0" cy="0" r="60" fill="url(#seaweed)"/>
      <circle cx="0" cy="0" r="45" fill="url(#rice)"/>
      <ellipse cx="-10" cy="-8" rx="14" ry="10" fill="#f28a62"/>
      <ellipse cx="12" cy="-9" rx="12" ry="9" fill="#f28a62"/>
      <circle cx="-12" cy="16" r="9" fill="#8eb858"/>
      <circle cx="13" cy="15" r="8" fill="#e06b47"/>
    </g>
  </g>
  <text x="56" y="86" font-size="44" font-family="Georgia, serif" fill="#2f5b67">Shrimp Kimbap</text>
