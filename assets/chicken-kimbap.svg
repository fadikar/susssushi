<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-labelledby="title desc">
  <title id="title">Chicken kimbap illustration</title>
  <desc id="desc">Stylized sliced chicken kimbap on a dark plate with garnish.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6efe2"/>
      <stop offset="100%" stop-color="#e9dbc6"/>
    </linearGradient>
    <linearGradient id="seaweed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14221b"/>
      <stop offset="100%" stop-color="#29382f"/>
    </linearGradient>
    <radialGradient id="rice" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#fffdf5"/>
      <stop offset="100%" stop-color="#ece8de"/>
    </radialGradient>
  </defs>
  <rect width="800" height="520" fill="url(#bg)"/>
  <ellipse cx="400" cy="290" rx="280" ry="145" fill="#2c2c2c"/>
  <g transform="translate(160 210)">
    <g transform="translate(0 0)">
      <circle cx="0" cy="0" r="62" fill="url(#seaweed)"/>
      <circle cx="0" cy="0" r="46" fill="url(#rice)"/>
      <circle cx="-12" cy="-10" r="12" fill="#d99a63"/>
      <circle cx="13" cy="-10" r="9" fill="#8fb550"/>
      <circle cx="6" cy="13" r="10" fill="#d85c42"/>
      <circle cx="-15" cy="14" r="8" fill="#f1c86b"/>
    </g>
    <g transform="translate(110 -6)">
      <circle cx="0" cy="0" r="62" fill="url(#seaweed)"/>
      <circle cx="0" cy="0" r="46" fill="url(#rice)"/>
      <circle cx="-10" cy="-11" r="12" fill="#d99a63"/>
      <circle cx="14" cy="-10" r="9" fill="#8fb550"/>
      <circle cx="5" cy="13" r="10" fill="#d85c42"/>
      <circle cx="-14" cy="13" r="8" fill="#f1c86b"/>
    </g>
    <g transform="translate(220 -12)">
      <circle cx="0" cy="0" r="62" fill="url(#seaweed)"/>
      <circle cx="0" cy="0" r="46" fill="url(#rice)"/>
      <circle cx="-12" cy="-9" r="12" fill="#d99a63"/>
      <circle cx="13" cy="-9" r="9" fill="#8fb550"/>
      <circle cx="6" cy="14" r="10" fill="#d85c42"/>
      <circle cx="-16" cy="14" r="8" fill="#f1c86b"/>
    </g>
    <g transform="translate(330 -18)">
      <circle cx="0" cy="0" r="62" fill="url(#seaweed)"/>
      <circle cx="0" cy="0" r="46" fill="url(#rice)"/>
      <circle cx="-11" cy="-10" r="12" fill="#d99a63"/>
      <circle cx="14" cy="-8" r="9" fill="#8fb550"/>
      <circle cx="5" cy="14" r="10" fill="#d85c42"/>
      <circle cx="-15" cy="13" r="8" fill="#f1c86b"/>
    </g>
  </g>
  <text x="56" y="86" font-size="44" font-family="Georgia, serif" fill="#6f4026">Chicken Kimbap</text>
</svg>
